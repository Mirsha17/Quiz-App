<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Master</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="/assets/logo.jpg" type="image/x-icon">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-dark d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container justify-content-center">
    </div>
  </nav>
  <!-- Quiz Container -->
  <div class="container my-5 flex-grow-1">
    <div class="row justify-content-center">
      <div class="col-xl-8 col-lg-9 col-md-10 col-12">
        <!-- Quiz Card -->
        <div class="quiz-card mx-auto">
          <!-- Header -->
          <header class="text-center mb-3">
            <h1>⚡ Interactive Quiz</h1>

            <div class="progress-section mt-3">
              <div id="progress-text">Question 1 / 10</div>
              <div class="progress">
                <div class="progress-bar" id="progress-fill" role="progressbar" style="width: 0%;"></div>
              </div>
            </div>
            <div id="timer" class="timer mt-2">⏱️ 10s</div>
          </header>
          <!-- Quiz Box -->
          <main id="quiz-box">
            <h2 id="question" class="text-center mb-4">Loading Question...</h2>
            <div id="choices" class="d-grid gap-3"></div>
            <button id="next-btn" class="btn mt-3">Next ➡️</button>
          </main>
          <!-- Result Box -->
          <div id="result-box" class="hidden text-center p-4">
            <h2>🎉 Quiz Completed!</h2>
            <p id="score" class="h5 mt-3"></p>
            <div id="summary" class="text-start mt-3"></div>
            <button id="restart-btn" class="btn mt-4">🔄 Restart Quiz</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
